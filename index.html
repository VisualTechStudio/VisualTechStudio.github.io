<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VTStudio</title>
  <style>
    :root {
      --bg-color: #ffffff;
      --text-color: #24292f;
      --sub-text-color: #57606a;
      --code-bg: #f6f8fa;
      --code-border: #d0d7de;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #0d1117;
        --text-color: #c9d1d9;
        --sub-text-color: #8b949e;
        --code-bg: #161b22;
        --code-border: #30363d;
      }
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      transition: background-color 0.3s, color 0.3s;
    }

    .vts-subtext {
      color: var(--sub-text-color);
    }

    .vts-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .vts-hero-section {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      box-sizing: border-box;
    }

    .vts-content-section {
      padding: 60px 0;
      text-align: center;
    }

    .vts-logo {
      width: 200px;
      height: 200px;
      border-radius: 40px;
      margin-bottom: 20px;
    }

    .vts-code-wrapper {
      display: inline-flex;
      align-items: center;
      background-color: var(--code-bg);
      border: 1px solid var(--code-border);
      border-radius: 6px;
      padding: 8px 16px;
      margin-top: 15px;
      max-width: 100%;
      box-sizing: border-box;
    }

    .vts-code-text {
      font-family: ui-monospace, SFMono-Regular, SF Pro Mono, Liberation Mono, Menlo, monospace;
      font-size: 14px;
      white-space: nowrap;
      overflow-x: auto;
      margin-right: 12px;
    }

    .vts-copy-btn {
      background: none;
      border: none;
      color: var(--sub-text-color);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, color 0.2s;
    }

    .vts-copy-btn:hover {
      background-color: var(--code-border);
      color: var(--text-color);
    }

    .vts-copy-btn svg {
      width: 18px;
      height: 18px;
    }

    .vts-chart {
      max-width: 100%;
      height: auto;
    }
  </style>
</head>
<body>

<div class="vts-container">
  
  <section class="vts-hero-section">
    <img src="./logo.png" class="vts-logo" alt="Logo" />
    
    <h1>👋 Hello! We are VisualTechStudio</h1>
    <p class="vts-subtext">我们的所有静态网站都在此处开源 并由Github托管</p>
    
    <div class="vts-code-wrapper">
      <span class="vts-code-text" id="repo-url">https://github.com/VisualTechStudio/VisualTechStudio.github.io/</span>
      <button class="vts-copy-btn" onclick="copyCode()" aria-label="Copy code">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 8V5.2C8 4.0799 8 3.51984 8.21799 3.09202C8.40973 2.71569 8.71569 2.40973 9.09202 2.21799C9.51984 2 10.0799 2 11.2 2H18.8C19.9201 2 20.4802 2 20.908 2.21799C21.2843 2.40973 21.5903 2.71569 21.782 3.09202C22 3.51984 22 4.0799 22 5.2V12.8C22 13.9201 22 14.4802 21.782 14.908C21.5903 15.2843 21.2843 15.5903 20.908 15.782C20.4802 16 19.9201 16 18.8 16H16M5.2 22H12.8C13.9201 22 14.4802 22 14.908 21.782C15.2843 21.5903 15.5903 21.2843 15.782 20.908C16 20.4802 16 19.9201 16 18.8V11.2C16 10.0799 16 9.51984 15.782 9.09202C15.5903 8.71569 15.2843 8.40973 14.908 8.21799C14.4802 8 13.9201 8 12.8 8H5.2C4.0799 8 3.51984 8 3.09202 8.21799C2.71569 8.40973 2.40973 8.71569 2.21799 9.09202C2 9.51984 2 10.0799 2 11.2V18.8C2 19.9201 2 20.4802 2.21799 20.908C2.40973 21.2843 2.71569 21.5903 3.09202 21.782C3.51984 22 4.07989 22 5.2 22Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </section>

  <section class="vts-content-section">
    <h3>👥 Team Members</h3>
    <div>
      <img src="./ShayneHui.png" width="70" alt="ShayneHui" />
      &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
      <img src="./KL_Xydwg01.png" width="70" alt="KL_Xydwg01" />
      <br />
      <strong>ShayneHui</strong>
      &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
      <strong>KL_Xydwg01</strong>
    </div>

    <br><br>

    <h3>👾 Our Skill Set</h3>
    <img src="https://skillicons.dev/icons?i=visualstudio,vscode,androidstudio,vim,obsidian,ps,ai,github,gitlab,githubactions,docker,kubernetes,linux,nginx,cloudflare,wordpress,elasticsearch,mongodb,mysql,redis,kotlin,c,cpp,go,py,dotnet,html,css,bash,md&amp;theme=dark" alt="My Skills" />

    <br><br>

    <h3>📦 Our Projects</h3>
    <a href="https://www.star-history.com/?repos=VisualTechStudio%2FVTStudioToolBox%2CVisualTechStudio%2FClearSight%2CVisualTechStudio%2FROG-B550-A-Gaming-OpenCore-EFI&amp;type=date&amp;legend=top-left">
      <picture>
        <source media="(prefers-color-scheme: dark)" srcset="https://api.star-history.com/chart?repos=VisualTechStudio/VTStudioToolBox%2CVisualTechStudio/ClearSight%2CVisualTechStudio/ROG-B550-A-Gaming-OpenCore-EFI&amp;type=date&amp;theme=dark&amp;legend=top-left" />
        <source media="(prefers-color-scheme: light)" srcset="https://api.star-history.com/chart?repos=VisualTechStudio/VTStudioToolBox%2CVisualTechStudio/ClearSight%2CVisualTechStudio/ROG-B550-A-Gaming-OpenCore-EFI&amp;type=date&amp;legend=top-left" />
        <img alt="Star History Chart" src="https://api.star-history.com/chart?repos=VisualTechStudio/VTStudioToolBox%2CVisualTechStudio/ClearSight%2CVisualTechStudio/ROG-B550-A-Gaming-OpenCore-EFI&amp;type=date&amp;legend=top-left" class="vts-chart" />
      </picture>
    </a>
  </section>

</div>

<script>
  const defaultIcon = `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M8 8V5.2C8 4.0799 8 3.51984 8.21799 3.09202C8.40973 2.71569 8.71569 2.40973 9.09202 2.21799C9.51984 2 10.0799 2 11.2 2H18.8C19.9201 2 20.4802 2 20.908 2.21799C21.2843 2.40973 21.5903 2.71569 21.782 3.09202C22 3.51984 22 4.0799 22 5.2V12.8C22 13.9201 22 14.4802 21.782 14.908C21.5903 15.2843 21.2843 15.5903 20.908 15.782C20.4802 16 19.9201 16 18.8 16H16M5.2 22H12.8C13.9201 22 14.4802 22 14.908 21.782C15.2843 21.5903 15.5903 21.2843 15.782 20.908C16 20.4802 16 19.9201 16 18.8V11.2C16 10.0799 16 9.51984 15.782 9.09202C15.5903 8.71569 15.2843 8.40973 14.908 8.21799C14.4802 8 13.9201 8 12.8 8H5.2C4.0799 8 3.51984 8 3.09202 8.21799C2.71569 8.40973 2.40973 8.71569 2.21799 9.09202C2 9.51984 2 10.0799 2 11.2V18.8C2 19.9201 2 20.4802 2.21799 20.908C2.40973 21.2843 2.71569 21.5903 3.09202 21.782C3.51984 22 4.07989 22 5.2 22Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  const successIcon = `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M20 6L9 17L4 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  const failureIcon = `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M17 7L7 17M7 7L17 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

  function copyCode() {
    const codeText = document.getElementById('repo-url').innerText;
    const btn = document.querySelector('.vts-copy-btn');
    
    navigator.clipboard.writeText(codeText).then(() => {
      btn.innerHTML = successIcon;
      setTimeout(() => {
        btn.innerHTML = defaultIcon;
      }, 2000);
    }).catch(err => {
      console.error('复制失败: ', err);
      btn.innerHTML = failureIcon;
      setTimeout(() => {
        btn.innerHTML = defaultIcon;
      }, 2000);
    });
  }
</script>

</body>
</html>
